<div
  [ngClass]="{ 'organize-readonly': readonly, 'organize-fullpage': !readonly }"
>
  <nz-page-header nzBackIcon *ngIf="!readonly">
    <nz-page-header-title>CẤU TRÚC TỔ CHỨC</nz-page-header-title>
    <nz-page-header-extra>
      <div class="header-actions">
        <div class="search-group">
          <input
            class="search-input"
            type="text"
            nz-input
            placeholder="Tìm kiếm"
            [(ngModel)]="searchValue"
            (keyup.enter)="searchTables(searchValue)"
          />
          <div class="search-buttons">
            <button
              (click)="searchTables(searchValue)"
              class="flex !items-center gray-btn"
              nzType="default"
              nz-button
            >
              <span nz-icon nzType="search"></span>
            </button>
            <button
              (click)="reset()"
              class="flex !items-center gray-btn"
              nzType="default"
              nz-button
            >
              <span nz-icon nzType="redo"></span>
            </button>
          </div>
        </div>
      </div>
    </nz-page-header-extra>
    <nz-page-header-content class="main-content">
      <nz-tree
        #treeCom
        class="!pl-[10px] overflow-auto"
        [nzData]="nodes"
        nzDraggable
        nzBlockNode
        (nzOnDrop)="nzEvent($event)"
        [nzSearchValue]="searchValue"
        (nzExpandChange)="nzEvent($event)"
        (nzSearchValueChange)="nzEvent($event)"
        (nzOnDrop)="onDrop($event)"
        (nzOnDragStart)="onDragStart($event)"
        [nzTreeTemplate]="nzTreeTemplate"
        [nzExpandedIcon]="multiExpandedIconTpl"
      >
        <ng-template #nzTreeTemplate let-node>
          <div class="flex justify-between pr-8 note_title">
            <div class="flex-1" (click)="onClick(node)">{{ node.title }}</div>
            <div *ngIf="!readonly">
              <span
                nz-icon
                (click)="openCreateChild(node)"
                nzType="plus-circle"
                nzTheme="twotone"
              ></span>
              <nz-divider nzType="vertical"></nz-divider>
            </div>
          </div>
        </ng-template>
        <ng-template #multiExpandedIconTpl let-node let-origin="origin">
          <span
            *ngIf="node.children.length > 0"
            nz-icon
            [nzType]="node.isExpanded ? 'caret-down' : 'caret-right'"
            nzTheme="outline"
            class="ant-tree-switcher-line-icon icon-tree"
          ></span>
        </ng-template>
      </nz-tree>
    </nz-page-header-content>
  </nz-page-header>

  <!-- Readonly mode: compact layout without page header -->
  <div *ngIf="readonly" class="readonly-organize-content">
    <div class="search-section">
      <div class="flex gap-2 mb-4">
        <input
          class="flex-1"
          type="text"
          nz-input
          placeholder="Tìm kiếm"
          [(ngModel)]="searchValue"
          (ngModelChange)="searchTables(searchValue)"
        />
        <button
          (click)="searchTables(searchValue)"
          class="flex !items-center gray-btn"
          nzType="default"
          nz-button
        >
          <span nz-icon nzType="search"></span>
        </button>
        <button
          (click)="reset()"
          class="flex !items-center gray-btn"
          nzType="default"
          nz-button
        >
          <span nz-icon nzType="redo"></span>
        </button>
      </div>
    </div>

    <div class="tree-section">
      <nz-tree
        #treeCom
        class="!pl-[10px] overflow-auto"
        [nzData]="nodes"
        nzDraggable
        nzBlockNode
        (nzOnDrop)="nzEvent($event)"
        [nzSearchValue]="searchValue"
        (nzExpandChange)="nzEvent($event)"
        (nzSearchValueChange)="nzEvent($event)"
        (nzOnDrop)="onDrop($event)"
        (nzOnDragStart)="onDragStart($event)"
        [nzTreeTemplate]="nzTreeTemplate"
        [nzExpandedIcon]="multiExpandedIconTpl"
      >
        <ng-template #nzTreeTemplate let-node>
          <div class="flex justify-between pr-8 note_title">
            <div class="flex-1" (click)="onClick(node)">{{ node.title }}</div>
          </div>
        </ng-template>
        <ng-template #multiExpandedIconTpl let-node let-origin="origin">
          <span
            *ngIf="node.children.length > 0"
            nz-icon
            [nzType]="node.isExpanded ? 'caret-down' : 'caret-right'"
            nzTheme="outline"
            class="ant-tree-switcher-line-icon icon-tree"
          ></span>
        </ng-template>
      </nz-tree>
    </div>
  </div>
</div>

<!--Create Update-->
<nz-drawer
  [nzMask]="true"
  [nzVisible]="visible"
  nzPlacement="right"
  nzSize="default"
  [nzClosable]="false"
  [nzTitle]="edit ? 'Chỉnh sửa ' : 'Tạo mới '"
>
  [nzExtra]="extra" (nzOnClose)="close()" >
  <ng-container *nzDrawerContent>
    <form
      nz-form
      nzLayout="vertical"
      [formGroup]="validateForm"
      (ngSubmit)="submitForm()"
    >
      <app-input-clear
        placeholder="Nhập mã đơn vị cha"
        [required]="true"
        label="Đơn vị cha"
        [control]="$any(validateForm).controls['pId']"
        [disabled]="true"
      >
      </app-input-clear>
      <app-input-clear
        placeholder="Nhập mã đơn vị"
        [required]="true"
        label="Mã đơn vị"
        [control]="$any(validateForm).controls['id']"
        [disabled]="edit ? true : false"
      >
      </app-input-clear>
      <app-input-clear
        placeholder="Nhập tên đơn vị"
        [required]="true"
        label="Tên đơn vị"
        [control]="$any(validateForm).controls['name']"
      ></app-input-clear>
      <nz-form-item>
        <nz-form-label>Trạng thái</nz-form-label>
        <nz-form-control>
          <nz-radio-group formControlName="isActive">
            <label nz-radio [nzValue]="true">Kích hoạt</label>
            <label nz-radio [nzValue]="false">Khoá</label>
          </nz-radio-group>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-drawer>

<ng-template #extra>
  <nz-space>
    <button
      *nzSpaceItem
      nz-button
      nzType="primary"
      class="!flex !items-center"
      (click)="submitForm()"
      [nzLoading]="loading"
    >
      <span nz-icon nzType="save" nzTheme="outline"></span>Lưu
    </button>
    <button
      *nzSpaceItem
      nz-button
      nzType="primary"
      class="!flex !items-center"
      nzDanger
      (click)="close()"
    >
      <span nz-icon nzType="close-circle" nzTheme="outline"></span>Huỷ
    </button>
  </nz-space>
</ng-template>
