<nz-page-header nzBackIcon>
  <nz-page-header-title>DANH SÁCH MENU</nz-page-header-title>
  <nz-page-header-extra>
    <div class="header-actions">
      <div class="search-group">
        <input
          class="search-input"
          type="text"
          nz-input
          placeholder="Tìm kiếm"
          [(ngModel)]="searchValue"
          (keyup.enter)="searchTables(searchValue)"
        />
        <div class="search-buttons">
          <button
            (click)="searchTables(searchValue)"
            class="flex !items-center gray-btn icon-only"
            nzType="default"
            nz-button
          >
            <span nz-icon nzType="search"></span>
          </button>
          <button
            (click)="reset()"
            class="flex !items-center gray-btn icon-only"
            nzType="default"
            nz-button
          >
            <span nz-icon nzType="redo"></span>
          </button>
        </div>
      </div>
      <div class="action-group">
        <button
          (click)="updateOrderTree()"
          class="!flex !items-center"
          nzType="default"
          nz-button
        >
          <span nz-icon nzType="check" nzTheme="outline"></span> Cập nhật thứ tự
        </button>
      </div>
    </div>
  </nz-page-header-extra>
  <nz-page-header-content class="main-content">
    <nz-tree
      #treeCom
      class="!pl-[10px] overflow-auto"
      [nzData]="nodes"
      nzDraggable
      nzBlockNode
      (nzOnDrop)="nzEvent($event)"
      [nzSearchValue]="searchValue"
      (nzExpandChange)="nzEvent($event)"
      (nzSearchValueChange)="nzEvent($event)"
      (nzOnDrop)="onDrop($event)"
      (nzOnDragStart)="onDragStart($event)"
      [nzTreeTemplate]="nzTreeTemplate"
      [nzExpandedIcon]="multiExpandedIconTpl"
    >
      <ng-template #nzTreeTemplate let-node>
        <div class="flex justify-between pr-8 note_title">
          <div class="flex-1" (click)="onClick(node)">{{ node.title }}</div>
          <div>
            <span
              nz-icon
              (click)="openCreateChild(node)"
              nzType="plus-circle"
              nzTheme="twotone"
            ></span>
          </div>
        </div>
      </ng-template>
      <ng-template #multiExpandedIconTpl let-node let-origin="origin">
        <span
          *ngIf="node.children.length > 0"
          nz-icon
          [nzType]="node.isExpanded ? 'caret-down' : 'caret-right'"
          nzTheme="outline"
          class="ant-tree-switcher-line-icon icon-tree"
        ></span>
      </ng-template>
    </nz-tree>
  </nz-page-header-content>
</nz-page-header>

<nz-drawer
  [nzMask]="true"
  nzSize="default"
  [nzVisible]="visible"
  nzPlacement="right"
  [nzTitle]="edit ? 'Cập nhật' : 'Thêm mới'"
  [nzExtra]="extra"
  (nzOnClose)="close()"
  [nzClosable]="false"
>
  <ng-container *nzDrawerContent>
    <nz-tabset (nzSelectedIndexChange)="onSelectedTab($event)">
      <nz-tab nzTitle="Thông tin">
        <form
          nz-form
          nzLayout="vertical"
          [formGroup]="validateForm"
          (ngSubmit)="submitForm()"
        >
          <app-input-clear
            placeholder="Nhập mã menu"
            [required]="true"
            label="Mã menu cha"
            [control]="$any(validateForm).controls['pId']"
            [disabled]="true"
          >
          </app-input-clear>
          <app-input-clear
            placeholder="Nhập mã menu"
            [required]="true"
            label="Mã menu"
            [control]="$any(validateForm).controls['id']"
            [disabled]="edit ? true : false"
          >
          </app-input-clear>
          <app-input-clear
            placeholder="Nhập tên menu"
            [required]="true"
            label="Tên menu"
            [control]="$any(validateForm).controls['name']"
          ></app-input-clear>
          <app-input-clear
            placeholder="Nhập đường dẫn"
            label="Tên đường dẫn"
            [control]="$any(validateForm).controls['url']"
          ></app-input-clear>
          <app-input-clear
            placeholder="Nhập icon"
            label="Tên icon"
            [control]="$any(validateForm).controls['icon']"
          >
          </app-input-clear>
        </form>
      </nz-tab>
      <nz-tab *ngIf="edit" nzTitle="Phân quyền">
        <app-menu-right
          [menuDetail]="nodeCurrent"
          (childEvent)="handleChildEvent($event)"
        ></app-menu-right>
      </nz-tab>
    </nz-tabset>
  </ng-container>
</nz-drawer>
<ng-template #extra>
  <nz-space>
    <button
      [nzLoading]="loading"
      *nzSpaceItem
      nz-button
      nzType="default"
      class="!flex !items-center"
      (click)="submitForm()"
    >
      <span nz-icon nzType="save" nzTheme="outline"></span>Lưu
    </button>
    <button
      *nzSpaceItem
      nz-button
      nzType="default"
      class="!flex !items-center"
      nzDanger
      (click)="close()"
    >
      <span nz-icon nzType="close-circle" nzTheme="outline"></span>Đóng
    </button>
  </nz-space>
</ng-template>
